apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-hello
  namespace: nginx-hello
  labels:
    app.kubernetes.io/name: nginx-hello
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-hello
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-hello
        app.kubernetes.io/component: web
    spec:
      # Opt out of automounting the default SA token — this pod needs no API access
      automountServiceAccountToken: false

      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Mount the custom HTML over NGINX's default root
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # Readiness: only route traffic once NGINX is serving
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          # Liveness: restart the container if NGINX stops responding
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15

          # Drop all Linux capabilities — NGINX on port 80 inside a container
          # does not need elevated privileges
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # NGINX writes temp/pid files
            runAsNonRoot: false             # nginx:alpine master binds port 80 as root, workers drop
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

      volumes:
        - name: html
          configMap:
            name: nginx-hello-html
