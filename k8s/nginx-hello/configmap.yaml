apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-hello-html
  namespace: nginx-hello
  labels:
    app.kubernetes.io/name: nginx-hello
    app.kubernetes.io/component: config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Hello World</title>
      <style>
        body {
          margin: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          background: #1a1a2e;
          font-family: 'Segoe UI', system-ui, sans-serif;
          color: #e0e0e0;
        }
        .card {
          text-align: center;
          padding: 3rem 4rem;
          background: #16213e;
          border-radius: 16px;
          box-shadow: 0 8px 32px rgba(0,0,0,0.4);
          border: 1px solid #0f3460;
        }
        h1 {
          font-size: 3.5rem;
          margin: 0 0 1rem;
          background: linear-gradient(135deg, #4fc3f7, #81d4fa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        p {
          font-size: 1.1rem;
          color: #90caf9;
          margin: 0;
        }
        .badge {
          display: inline-block;
          margin-top: 1.5rem;
          padding: 0.4rem 1rem;
          background: #0f3460;
          border-radius: 20px;
          font-size: 0.85rem;
          color: #4fc3f7;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Hello World</h1>
        <p>Running on NGINX &bull; Kubernetes &bull; GKE</p>
        <div class="badge">cloud-practice-sandbox</div>
      </div>
    </body>
    </html>
